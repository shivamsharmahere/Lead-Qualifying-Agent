version: '3.8'

services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: leadbot_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://admin:secretpassword@db:5432/leadbot_db
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - db

  dashboard:
    build: 
      context: .
      dockerfile: dashboard.Dockerfile
    ports:
      - "8501:8501"
    environment:
      - DATABASE_URL=postgresql+asyncpg://admin:secretpassword@db:5432/leadbot_db
    depends_on:
      - db

volumes:
  postgres_data:
